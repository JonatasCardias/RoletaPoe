<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PoE Mirage Roulette - Final Edition</title>
    <style>
        body {
            background: #000 url('layeredkeyart-highreslogo_7qdg.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            margin: 0; 
            color: #ffd700; 
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* Container ampliado para acomodar roletas maiores */
        .container { 
            position: relative; 
            width: 850px; 
            height: 850px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* Marcador Superior */
        .marker {
            position: absolute; 
            top: 10px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 25px solid transparent; 
            border-right: 25px solid transparent;
            border-top: 40px solid #ffd700; 
            z-index: 110; 
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
        }

        /* Linha Guia Vertical */
        .guide-line {
            position: absolute; 
            top: 25px; 
            left: 50%; 
            width: 3px; 
            height: 400px; 
            background: linear-gradient(to bottom, #ffd700, rgba(255, 215, 0, 0));
            transform: translateX(-50%); 
            z-index: 105; 
            pointer-events: none;
        }

        .wheel {
            position: absolute; 
            border-radius: 50%; 
            border: 3px solid #5a4a3a;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            display: flex; 
            justify-content: center; 
            align-items: center;
            /* Sombra externa para distanciamento do background */
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.9));
        }

        /* Camadas ampliadas para os textos não vazarem */
        #outer { width: 800px; height: 800px; z-index: 1; }
        #mid   { width: 540px; height: 540px; z-index: 2; }
        #inner { width: 280px; height: 280px; z-index: 3; }

        .label {
            position: absolute; 
            width: 100%; 
            height: 100%;
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding-top: 25px; /* Espaço do topo da borda */
            box-sizing: border-box;
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 15px; /* Texto levemente maior para leitura */
            text-shadow: 2px 2px 3px #000;
            letter-spacing: 1px;
        }

        /* Ajuste de fonte para a roleta interna */
        #inner .label { font-size: 12px; padding-top: 20px; }

        button {
            margin-top: 30px; 
            padding: 18px 70px; 
            background: rgba(20, 15, 10, 0.95);
            color: #ffd700; 
            border: 2px solid #ffd700; 
            font-size: 26px; 
            cursor: pointer;
            text-transform: uppercase; 
            letter-spacing: 4px; 
            transition: 0.3s;
            z-index: 120;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        button:hover { 
            background: #ffd700; 
            color: #000; 
            box-shadow: 0 0 30px gold; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="marker"></div>
        <div class="guide-line"></div>
        
        <div id="outer" class="wheel"></div>
        <div id="mid" class="wheel"></div>
        <div id="inner" class="wheel"></div>
    </div>

    <button onclick="spin()">Girar Destino</button>

    <script>
        const config = [
            {
                id: 'outer',
                items: ['AIOV', 'BLACK', 'DURZAG', 'IGOR', 'KANASHIRO', 'RAPTOR', 'SNAKE', 'TRABALHO'],
                colors: ['#4a0e0e', '#0e2a4a', '#2d4a0e', '#4a3c0e', '#3b0e4a', '#0e4a43', '#4a1d0e', '#1a1a1a']
            },
            {
                id: 'mid',
                items: ['FAZER', 'CHORAR', 'MAMAR', 'RUSHAR', 'QUITAR', 'MENDIGAR', 'COMPRAR'],
                colors: ['#632b2b', '#2b6341', '#2b4063', '#39632b', '#63512b', '#4a2b63', '#2b635a']
            },
            {
                id: 'inner',
                items: ['DA LIGA', 'EM 10 MIN', 'CHALLENGES', 'CURRENCY', '50 BUILDS', 'T. SHOW'],
                colors: ['#8c3a3a', '#3a568c', '#4a8c3a', '#8c743a', '#663a8c', '#3a8c7e']
            }
        ];

        function createWheel(conf) {
            const el = document.getElementById(conf.id);
            const numItems = conf.items.length;
            const step = 360 / numItems;
            
            let gradientStr = "conic-gradient(";
            conf.colors.forEach((color, i) => {
                const start = i * step;
                const end = (i + 1) * step;
                gradientStr += `${color} ${start}deg ${end}deg${i === numItems - 1 ? '' : ','}`;
            });
            gradientStr += ")";
            el.style.background = gradientStr;

            conf.items.forEach((text, i) => {
                const label = document.createElement('div');
                label.className = 'label';
                label.style.transform = `rotate(${(i * step) + (step / 2)}deg)`;
                label.innerText = text;
                el.appendChild(label);
            });
        }

        config.forEach(createWheel);

        let curRot = [0, 0, 0];
        function spin() {
            const base = Math.floor(Math.random() * 360) + 2520; // Aumentado para 7 voltas mínimas
            
            curRot[0] += base;
            curRot[1] -= (base + 600);
            curRot[2] += (base + 1200);

            document.getElementById('outer').style.transform = `rotate(${curRot[0]}deg)`;
            document.getElementById('mid').style.transform = `rotate(${curRot[1]}deg)`;
            document.getElementById('inner').style.transform = `rotate(${curRot[2]}deg)`;
        }
    </script>
</body>
</html>
